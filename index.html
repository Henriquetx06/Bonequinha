<html lang="pt-BR">

  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
    body { font-family: 'Georgia', serif; background-color: #1a1a1a; color: #fff; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; transition: background-color 1s ease-in-out; }
    
    .app-container { width: 100%; max-width: 430px; height: 100vh; position: relative; display: flex; flex-direction: column; justify-content: center; align-items: center; }

    #screen1 { text-align: center; padding: 20px; transition: opacity 0.8s ease, transform 0.8s ease; z-index: 10; }

    #main-btn { 
      background-color: #fff; color: #9c1b4b; border: none; border-radius: 50px; 
      font-family: 'Georgia', serif; font-weight: bold; font-size: 1.5rem; 
      padding: 20px 60px; cursor: pointer; box-shadow: 0 10px 30px rgba(0,0,0,0.3); 
      transition: transform 0.1s ease; touch-action: manipulation;
    }
    #main-btn:active { transform: scale(0.9); }

    #screen2 { display: none; position: absolute; width: 90%; max-width: 400px; height: 300px; background-color: #fff5e6; border-radius: 30px; box-shadow: 0 20px 50px rgba(0,0,0,0.4); flex-direction: column; padding: 20px; opacity: 0; transform: translateY(30px); transition: opacity 1s ease, transform 1s ease; overflow: hidden; z-index: 20; }
